spring:
  application:
    name: pullcat

  # --- AI 模型配置 ---
  # 需要 DeepSeek API Key，获取地址：https://platform.deepseek.com/api_keys
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat

  # --- Redis 配置 ---
  # Redis 用于存储 Review 会话状态（自动过期）。
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # --- OAuth2 登录配置 ---
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope: read:user
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          github:
            user-name-attribute: login

# =============================================================================
# pullcat 自定义配置
# =============================================================================

pullcat:
  # --- GitHub 配置 ---
  github:
    # Personal Access Token，需要 repo 权限。
    # 生成地址：https://github.com/settings/tokens
    # 私有仓库需要 repo 权限，公开仓库需要 public_repo 权限
    token: ${GITHUB_TOKEN}

  # --- LLM 模型配置 ---
  llm:
    # 轻量模型：用于摘要、测试覆盖等快速分析
    light-model: deepseek-v4-flash
    # 重量模型：用于风险、质量、一致性等深度分析
    heavy-model: deepseek-v4-flash

  # --- 限流配置 ---
  rate-limit:
    # 全局默认：60 请求/分钟
    default-max: 60
    default-window-seconds: 60
    # 审查创建：100 请求/分钟 (放宽以便本地测试)
    review-create-max: 100
    review-create-window-seconds: 60
    # 统计查询：30 请求/分钟
    stats-max: 30
    stats-window-seconds: 60

  # --- 超时配置 ---
  timeout:
    github-seconds: 30
    llm-seconds: 120


# --- 服务器配置 ---
server:
  port: 8080

# 静默 SSE 断连时的 Broken pipe 日志噪音
logging:
  level:
    org.apache.catalina.connector.CoyoteAdapter: WARN

# --- Actuator 配置 ---
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
